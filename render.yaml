services:
  - type: web
    name: anupama-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/start_backend.py
    envVars:
      - key: MINDFUL_CHECKPOINT_DIR
        value: /opt/render/project/src/checkpoints
      - key: MODEL_DEVICE
        value: cpu
      - key: BEST_MODEL_URL
        sync: false
      - key: FINAL_MODEL_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
