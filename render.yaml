services:
  - type: web
    name: anupama-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MINDFUL_CHECKPOINT_DIR
        value: /opt/render/project/src/checkpoints
      - key: MODEL_DEVICE
        value: cpu
      - key: CORS_ORIGINS
        sync: false
